version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    # Collapse the interrelated lint toolchain (they share peer ranges and are
    # usually reviewed together) into one weekly PR instead of one per package.
    groups:
      wordpress-lint-toolchain:
        patterns:
          - "@wordpress/*"
          - "eslint*"
          - "stylelint*"
          - "prettier"
          - "typescript"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 3
    # Action bumps are low-risk and frequent — batch them into one PR.
    groups:
      github-actions:
        patterns:
          - "*"
